# 워크플로우 이름
name: N0tice Dev CI/CD

# 'develop' 브랜치에 push될 때 실행
on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  # 작업 1: 애플리케이션 빌드 및 Docker 이미지 생성/푸시
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # 3. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Gradle 빌드
      # 이 단계에서 application.properties의 변수들은 아직 비어있지만, 빌드 자체에는 문제가 없습니다.
      - name: Build with Gradle
        run: ./gradlew build

      # 5. Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 6. Docker 이미지 빌드 및 푸시
      # application.properties가 포함된 .jar 파일이 이미지에 복사됨.
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

# 작업 2: EC2에 Docker 이미지 배포 및 실행
deploy:
  needs: build
  runs-on: ubuntu-latest
  steps:
    - name: SSH connect & deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # EC2 서버에서 Docker Hub 로그인
          sudo docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_HUB_TOKEN }}
          
          # 최신 이미지 받아오기
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
          
          # 기존 컨테이너 중지 및 삭제
          sudo docker stop ${{ secrets.DOCKER_IMAGE_NAME }} || true
          sudo docker rm ${{ secrets.DOCKER_IMAGE_NAME }} || true
          
          # docker run 명령어에 -e 옵션으로 환경 변수를 직접 주입
          sudo docker run --name ${{ secrets.DOCKER_IMAGE_NAME }} --rm -d -p 8080:8080 \
            -e DB_URL=${{ secrets.DB_URL }} \
            -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
            -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
            -e JWT_KEY=${{ secrets.JWT_KEY }} \
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest
          
          # 사용하지 않는 이미지 정리
          sudo docker image prune -af