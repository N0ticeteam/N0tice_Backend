# 워크플로우 이름
name: N0tice Dev CI/CD

# 'develop' 브랜치에 push될 때 실행
on:
  push:
    branches:
      - develop

permissions:
  contents: read

jobs:
  # 작업 1: 애플리케이션 빌드 및 Docker 이미지 생성/푸시
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 소스 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # 3. gradlew 실행 권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Gradle 빌드
      - name: Build with Gradle
        run: ./gradlew build -x test

      # 5. Docker Hub 로그인
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 6. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

# 작업 2: EC2에 Docker 이미지 배포 및 실행
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
     - name: SSH connect & deploy to EC2
       uses: appleboy/ssh-action@v1.0.3
       with:
         host: ${{ secrets.EC2_HOST }}
         username: ${{ secrets.USERNAME }}
         key: ${{ secrets.PASSWORD }}
         script: |
           # --- 디버깅 단계 1: 어떤 이미지 이름과 토큰이 사용되는지 직접 확인 ---
           echo "--- Using Docker Image Name: ${{ secrets.DOCKER_IMAGE_NAME }} ---"
           echo "--- Logging into Docker Hub as: ${{ secrets.DOCKER_USERNAME }} ---"
           sudo docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_HUB_TOKEN }}

           # --- 디버깅 단계 2: 이미지 pull이 성공하는지 확인 ---
           echo "--- Pulling the latest image... ---"
           sudo docker pull ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

           # --- 기존 컨테이너 정리 ---
           echo "--- Stopping and removing old container (if it exists)... ---"
           sudo docker stop ${{ secrets.DOCKER_IMAGE_NAME }} || true
           sudo docker rm ${{ secrets.DOCKER_IMAGE_NAME }} || true

           # --- 새로운 컨테이너 실행 (문법을 완벽하게 수정한 버전) ---
           # 각 줄의 끝에는 오직 백슬래시(\)만 있어야 합니다.
           echo "--- Starting new container... ---"
           sudo docker run --name ${{ secrets.DOCKER_IMAGE_NAME }} -d -p 443:443 \
             -e SERVER_PORT=443 \
             -e DB_URL=${{ secrets.DB_URL }} \
             -e DB_USERNAME=${{ secrets.DB_USERNAME }} \
             -e DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
             -e OAUTH_NAVER_CLIENT_ID=${{ secrets.OAUTH_NAVER_CLIENT_ID }} \
             -e OAUTH_NAVER_CLIENT_SECRET=${{ secrets.OAUTH_NAVER_CLIENT_SECRET }} \
             -e OAUTH_NAVER_REDIRECT_URI=${{ secrets.OAUTH_NAVER_REDIRECT_URI }} \
             -e SSL_KEYSTORE_TYPE=${{ secrets.SSL_KEYSTORE_TYPE }} \
             -e SSL_KEYSTORE_PASSWORD=${{ secrets.SSL_KEYSTORE_PASSWORD }} \
             -e REDIS_HOST=${{ secrets.REDIS_HOST }} \
             -e REDIS_PORT=${{ secrets.REDIS_PORT }} \
             -e JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
             -e JWT_ACCESS_TOKEN_EXPIRATION_TIME=${{ secrets.JWT_ACCESS_TOKEN_EXPIRATION_TIME }} \
             -e JWT_REFRESH_TOKEN_EXPIRATION_TIME=${{ secrets.JWT_REFRESH_TOKEN_EXPIRATION_TIME }} \
             -e JWT_REDIRECT=${{ secrets.JWT_REDIRECT }} \
             -e PUBLIC_API_SERVICE_KEY=${{ secrets.PUBLIC_API_SERVICE_KEY }} \
             ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKER_IMAGE_NAME }}:latest

           # --- 디버깅 단계 3: 배포 직후 상태 확인 ---
           # 컨테이너가 시작되거나 실패할 시간을 5초 정도 줍니다.
           echo "--- Waiting for 5 seconds... ---"
           sleep 5

           # GitHub Actions 로그에서 최종 컨테이너 상태를 직접 확인합니다.
           echo "--- Final container status on EC2 server: ---"
           sudo docker ps -a

           # --- 불필요한 이미지 정리 ---
           echo "--- Pruning old Docker images... ---"
           sudo docker image prune -af
